<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>2026 유럽 여행 플래너</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --sky-deep:#7ec8e3;--sky-accent:#2196f3;--sky-dark:#1565c0;
      --card-bg:rgba(255,255,255,0.9);--shadow:0 4px 24px rgba(33,150,243,.10);
      --radius:16px;--font:'Noto Sans KR',sans-serif;--font-d:'Playfair Display',serif;
      --type-move:#ff9800;--type-hotel:#9c27b0;--type-food:#e91e63;--type-tour:#4caf50;--type-free:#607d8b;
      --hdr:linear-gradient(90deg,#1976d2,#42a5f5);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{font-family:var(--font);background:linear-gradient(160deg,#cce9fa,#e8f7ff 50%,#b8dff5);min-height:100vh;padding-bottom:80px;}

    /* LOADING SCREEN */
    .loading-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1565c0,#2196f3);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:16px;transition:opacity .5s;}
    .loading-screen.hidden{opacity:0;pointer-events:none;}
    .loading-title{font-family:var(--font-d);font-size:2rem;letter-spacing:1px;}
    .loading-sub{font-size:.88rem;opacity:.8;}
    .loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-status{font-size:.8rem;opacity:.7;margin-top:4px;}

    /* HEADER */
    .app-header{background:var(--hdr);color:#fff;padding:18px 16px 14px;box-shadow:0 4px 20px rgba(21,101,192,.2);}
    .app-header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
    .app-header h1{font-family:var(--font-d);font-size:1.65rem;letter-spacing:.5px;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .version-badge{background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.4);border-radius:20px;padding:3px 10px;font-size:.68rem;font-weight:700;letter-spacing:1px;}
    .sync-badge{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);cursor:pointer;}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#a5d6a7;flex-shrink:0;}
    .sync-dot.saving{background:#fff176;animation:pulse .6s infinite;}
    .sync-dot.error{background:#ef9a9a;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .header-actions{display:flex;gap:6px;flex-wrap:wrap;}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-weight:700;font-size:.8rem;transition:all .18s;-webkit-tap-highlight-color:transparent;}
    .btn-primary{background:linear-gradient(90deg,var(--sky-dark),var(--sky-accent));color:#fff;}
    .btn-ghost{background:rgba(255,255,255,.82);color:var(--sky-dark);border:1.5px solid var(--sky-deep);}
    .btn-ghost:active,.btn-primary:active{opacity:.8;}
    .btn-danger{background:rgba(255,255,255,.82);color:#e53935;border:1.5px solid #ffcdd2;}
    .btn-sm{padding:5px 11px;font-size:.75rem;}
    .btn-add-day{margin:16px auto;display:flex;width:fit-content;background:var(--hdr);color:#fff;font-size:.88rem;padding:10px 26px;box-shadow:0 3px 14px rgba(33,150,243,.22);}
    .btn-icon{background:rgba(255,255,255,.22);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
    .btn-icon:active{background:rgba(255,255,255,.4);}

    /* PROJECT TABS */
    .project-bar{background:rgba(255,255,255,.15);backdrop-filter:blur(6px);padding:0 14px;border-bottom:1px solid rgba(255,255,255,.18);}
    .project-scroll{display:flex;overflow-x:auto;scrollbar-width:none;}
    .project-scroll::-webkit-scrollbar{display:none;}
    .project-tab{display:flex;align-items:center;gap:5px;padding:9px 13px;cursor:pointer;font-size:.8rem;font-weight:600;color:rgba(255,255,255,.65);border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0;}
    .project-tab.active{color:#fff;border-bottom-color:#fff;}
    .project-tab-x{background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;font-size:.62rem;padding:1px 3px;line-height:1;border-radius:50%;}
    .project-add{padding:9px 11px;cursor:pointer;color:rgba(255,255,255,.65);font-size:1.1rem;font-weight:700;flex-shrink:0;background:none;border:none;}

    /* MAIN TABS */
    .tab-bar{max-width:900px;margin:14px auto 0;padding:0 14px;display:flex;gap:5px;}
    .tab-btn{padding:8px 20px;border:none;border-radius:10px 10px 0 0;font-family:var(--font);font-size:.83rem;font-weight:700;cursor:pointer;background:rgba(255,255,255,.45);color:#5a7a90;border:1.5px solid rgba(126,200,227,.3);border-bottom:none;}
    .tab-btn.active{background:rgba(255,255,255,.95);color:var(--sky-dark);}
    .tab-content{display:none;}.tab-content.active{display:block;}

    /* TRIP META */
    .trip-meta{max-width:900px;margin:0 auto;padding:0 14px;}
    .trip-meta-card{background:var(--card-bg);border-radius:0 var(--radius) var(--radius) var(--radius);box-shadow:var(--shadow);padding:15px 17px;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;border:1.5px solid rgba(126,200,227,.35);border-top:none;}
    .meta-field{display:flex;flex-direction:column;flex:1;min-width:90px;}
    .meta-label{font-size:.66rem;color:#7a9bb5;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
    .meta-field input{border:none;border-bottom:2px solid var(--sky-deep);background:transparent;font-family:var(--font);font-size:.9rem;padding:2px 3px;outline:none;color:#1a2a3a;width:100%;}
    .meta-field input:focus{border-bottom-color:var(--sky-accent);}

    /* DAYS */
    .days-container{max-width:900px;margin:14px auto 0;padding:0 14px;display:flex;flex-direction:column;}
    .between-divider{display:flex;align-items:center;gap:8px;padding:4px 0;}
    .between-divider-line{flex:1;height:2px;border-radius:2px;background:rgba(144,164,174,.25);}
    .between-divider-line.on{background:currentColor;opacity:.45;}
    .between-divider-label{font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--font);border:none;background:transparent;outline:none;text-align:center;min-width:60px;max-width:130px;}
    .between-divider-label::placeholder{opacity:.3;}
    .between-divider-add{width:20px;height:20px;border-radius:50%;border:1.5px dashed #b0ccd8;background:rgba(255,255,255,.7);color:#90aab8;font-size:.72rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .between-divider-remove{background:none;border:none;cursor:pointer;color:#c0cdd6;font-size:.72rem;padding:0 2px;flex-shrink:0;}

    /* DAY CARD */
    .day-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1.5px solid rgba(126,200,227,.25);margin:7px 0;}
    .day-card.drag-over{border-color:var(--sky-accent);}
    .day-card.dragging{opacity:.5;}
    .day-header{background:var(--hdr);color:#fff;padding:10px 13px;display:flex;align-items:center;gap:8px;}
    .day-drag-handle{font-size:.9rem;opacity:.6;flex-shrink:0;cursor:grab;padding:3px;}
    .day-number{font-family:var(--font-d);font-size:1rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
    .day-date-input{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:7px;color:#fff;font-family:var(--font);font-size:.78rem;padding:3px 7px;outline:none;width:122px;cursor:pointer;flex-shrink:0;}
    .day-date-input::-webkit-calendar-picker-indicator{filter:invert(1);}
    .day-title-input{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.32);color:#fff;font-family:var(--font);font-size:.83rem;padding:2px 4px;outline:none;min-width:0;}
    .day-title-input::placeholder{color:rgba(255,255,255,.48);}
    .day-header-actions{margin-left:auto;display:flex;gap:4px;flex-shrink:0;}

    /* SCHEDULE */
    .schedule-list{padding:9px 11px 4px;display:flex;flex-direction:column;gap:6px;}
    .schedule-list.collapsed{display:none;}
    .empty-schedule{text-align:center;color:#a0b8cc;font-size:.8rem;padding:13px 0;border:2px dashed #c8dce8;border-radius:9px;}
    .schedule-divider{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:grab;}
    .schedule-divider.dragging{opacity:.4;}
    .schedule-divider.drag-over-item{border-top:2px dashed var(--sky-accent);}
    .divider-line{flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,currentColor 18%,currentColor 82%,transparent);}
    .divider-label-input{border:none;background:transparent;font-family:var(--font);font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;outline:none;text-align:center;width:88px;cursor:text;color:inherit;}
    .divider-label-input::placeholder{color:rgba(0,0,0,.2);}
    .divider-del{background:none;border:none;cursor:pointer;color:#c0cdd6;font-size:.78rem;padding:0 2px;flex-shrink:0;}
    .schedule-item{display:flex;flex-direction:column;border-radius:10px;padding:8px 10px;box-shadow:0 1px 5px rgba(33,150,243,.07);border-left:4px solid var(--sky-deep);background:#fff;cursor:grab;}
    .schedule-item.dragging{opacity:.4;}
    .schedule-item.drag-over-item{border-top:2px dashed var(--sky-accent);}
    .schedule-item[data-type="move"]{border-left-color:var(--type-move);}
    .schedule-item[data-type="hotel"]{border-left-color:var(--type-hotel);}
    .schedule-item[data-type="food"]{border-left-color:var(--type-food);}
    .schedule-item[data-type="tour"]{border-left-color:var(--type-tour);}
    .schedule-item[data-type="free"]{border-left-color:var(--type-free);}
    .item-row1{display:flex;align-items:flex-start;gap:7px;width:100%;}
    .item-drag-handle{color:#c0cdd6;font-size:.88rem;margin-top:2px;cursor:grab;flex-shrink:0;}
    .item-time input{width:56px;border:none;background:#f0f7ff;border-radius:6px;font-size:.76rem;color:#1a2a3a;padding:3px 4px;font-family:var(--font);outline:none;text-align:center;}
    .item-body{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
    .item-name input{width:100%;border:none;background:transparent;font-size:.88rem;font-weight:700;color:#1a2a3a;font-family:var(--font);outline:none;padding:0;}
    .item-name input:focus{border-bottom:1.5px solid var(--sky-accent);}
    .item-memo input{width:100%;border:none;background:transparent;font-size:.76rem;color:#6a8899;font-family:var(--font);outline:none;padding:0;}
    .item-type select{border:none;background:#f0f7ff;border-radius:20px;font-size:.68rem;color:#1a2a3a;padding:2px 6px;font-family:var(--font);outline:none;cursor:pointer;}
    .item-actions{display:flex;align-items:flex-start;gap:1px;flex-shrink:0;}
    .item-photo-btn{background:none;border:none;cursor:pointer;color:#c8d8e0;font-size:.9rem;padding:2px;position:relative;flex-shrink:0;}
    .item-photo-btn input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
    .item-del-btn{background:none;border:none;cursor:pointer;color:#c0cdd6;font-size:.9rem;padding:2px;flex-shrink:0;}
    .add-item-row{padding:6px 11px 11px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}

    /* PHOTO */
    .photo-grid{display:flex;flex-wrap:wrap;gap:6px;}
    .photo-grid.day-pg{padding:0 11px 11px;}
    .photo-grid.item-pg{margin-top:6px;}
    .photo-thumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;box-shadow:0 2px 7px rgba(0,0,0,.12);flex-shrink:0;cursor:zoom-in;}
    .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .photo-thumb-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);border:none;border-radius:50%;width:17px;height:17px;color:#fff;font-size:.58rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .photo-upload-label{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;background:rgba(255,255,255,.82);color:var(--sky-dark);border:1.5px solid var(--sky-deep);cursor:pointer;font-size:.74rem;font-weight:700;}
    .photo-upload-label input[type="file"]{display:none;}
    .paste-zone{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1.5px dashed #b8d8ea;background:rgba(240,248,255,.5);font-size:.74rem;color:#7a9bb5;cursor:pointer;}
    .paste-zone:focus{border-color:var(--sky-accent);background:#e8f4ff;outline:none;}
    .kbd{background:#e8f0f8;border-radius:4px;padding:1px 4px;font-size:.67rem;font-weight:700;color:#4a6a84;border:1px solid #c8d8e8;}

    /* MEMO */
    .memo-outer{max-width:900px;margin:0 auto;padding:0 14px 60px;}
    .memo-wrap{background:rgba(255,255,255,.9);border-radius:0 var(--radius) var(--radius) var(--radius);box-shadow:var(--shadow);border:1.5px solid rgba(126,200,227,.32);border-top:none;overflow:hidden;}
    .memo-inner-tabs{display:flex;border-bottom:2px solid rgba(126,200,227,.18);background:rgba(224,244,255,.4);overflow-x:auto;scrollbar-width:none;padding:0 9px;}
    .memo-inner-tabs::-webkit-scrollbar{display:none;}
    .memo-tab-pill{display:flex;align-items:center;gap:4px;padding:8px 12px 8px 10px;cursor:pointer;font-size:.8rem;font-weight:600;color:#7a9bb5;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0;margin-bottom:-2px;}
    .memo-tab-pill.active{color:var(--sky-dark);border-bottom-color:var(--sky-accent);background:rgba(255,255,255,.55);border-radius:8px 8px 0 0;}
    .memo-tab-x{background:none;border:none;color:#c8d4dc;cursor:pointer;font-size:.63rem;padding:1px 3px;border-radius:50%;line-height:1;}
    .memo-add-pill{padding:8px 11px;cursor:pointer;color:var(--sky-accent);font-size:1rem;font-weight:700;flex-shrink:0;background:none;border:none;margin-bottom:-2px;line-height:1;}
    .memo-note-body{padding:18px 17px 16px;display:none;}
    .memo-note-body.active{display:block;}
    .memo-note-title{width:100%;font-family:var(--font-d);font-size:1.25rem;font-weight:700;color:#1a2a3a;border:none;border-bottom:2px solid rgba(126,200,227,.32);background:transparent;padding:3px 2px 8px;outline:none;margin-bottom:14px;}
    .memo-note-title:focus{border-bottom-color:var(--sky-accent);}
    .memo-note-title::placeholder{color:#c0d4de;font-family:var(--font);font-size:.95rem;font-weight:400;}
    .memo-textarea{width:100%;min-height:110px;border:1.5px solid rgba(126,200,227,.38);border-radius:9px;padding:9px 11px;font-family:var(--font);font-size:.84rem;color:#1a2a3a;background:rgba(255,255,255,.7);resize:vertical;outline:none;line-height:1.75;margin-bottom:14px;}
    .memo-textarea:focus{border-color:var(--sky-accent);background:#fff;}
    .memo-textarea::placeholder{color:#a8bfcc;}
    .memo-section-label{font-size:.68rem;font-weight:700;color:#7a9bb5;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    .memo-checklist{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
    .memo-check-item{display:flex;align-items:center;gap:8px;background:rgba(240,248,255,.7);border:1.5px solid rgba(126,200,227,.25);border-radius:8px;padding:6px 10px;}
    .memo-check-item:has(input[type="checkbox"]:checked){opacity:.5;}
    .memo-check-item input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:var(--sky-accent);flex-shrink:0;}
    .memo-check-item input[type="text"]{flex:1;border:none;background:transparent;font-family:var(--font);font-size:.84rem;color:#1a2a3a;outline:none;}
    .memo-check-item input[type="checkbox"]:checked+input[type="text"]{text-decoration:line-through;color:#9ab0be;}
    .memo-check-del{background:none;border:none;cursor:pointer;color:#c0cdd6;font-size:.82rem;flex-shrink:0;}

    /* TOASTS */
    .save-toast{position:fixed;bottom:16px;right:13px;background:rgba(21,101,192,.92);color:#fff;padding:7px 15px;border-radius:50px;font-size:.76rem;font-weight:700;opacity:0;transition:opacity .4s;pointer-events:none;z-index:999;}
    .save-toast.show{opacity:1;}
    .toast{position:fixed;bottom:52px;right:13px;background:rgba(20,50,20,.9);color:#fff;padding:8px 15px;border-radius:50px;font-size:.76rem;font-weight:700;opacity:0;transition:opacity .4s;pointer-events:none;max-width:290px;text-align:center;z-index:999;}
    .toast.show{opacity:1;}

    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:96vw;max-height:90vh;border-radius:8px;}
    .lightbox-close{position:fixed;top:15px;right:16px;background:none;border:none;color:#fff;font-size:1.9rem;cursor:pointer;}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:8888;align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px 18px 34px;width:100%;max-width:480px;box-shadow:0 -4px 30px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:var(--font-d);font-size:1.15rem;color:#1a2a3a;margin-bottom:5px;}
    .modal-sub{font-size:.78rem;color:#7a9bb5;margin-bottom:16px;line-height:1.55;}
    .modal-options{display:flex;flex-direction:column;gap:9px;}
    .modal-option{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:12px;border:1.5px solid rgba(126,200,227,.35);background:rgba(240,248,255,.5);cursor:pointer;}
    .modal-option:active{background:#e0f4ff;}
    .modal-option-icon{font-size:1.45rem;flex-shrink:0;}
    .modal-option-title{font-size:.88rem;font-weight:700;color:#1a2a3a;}
    .modal-option-desc{font-size:.73rem;color:#7a9bb5;margin-top:2px;}
    .modal-cancel{margin-top:13px;width:100%;padding:11px;border:none;background:rgba(235,235,235,.9);border-radius:12px;font-family:var(--font);font-size:.86rem;font-weight:700;color:#5a7a90;cursor:pointer;}

    option[value="move"]{color:var(--type-move);}option[value="hotel"]{color:var(--type-hotel);}
    option[value="food"]{color:var(--type-food);}option[value="tour"]{color:var(--type-tour);}
    option[value="free"]{color:var(--type-free);}
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-title">✈️ 2026 유럽</div>
  <div class="loading-spinner"></div>
  <div class="loading-sub">구글 시트에서 최신 데이터 불러오는 중...</div>
  <div class="loading-status" id="loading-status"></div>
</div>

<header class="app-header">
  <div class="app-header-top">
    <h1>Travel Planner</h1>
    <div class="header-right">
      <div class="sync-badge" onclick="forcSync()" title="탭하면 강제 동기화">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">동기화됨</span>
      </div>
      <span class="version-badge">V 3.0</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="openExportModal()">📤 내보내기</button>
    <button class="btn btn-danger btn-sm" onclick="resetCurrent()">🗑 초기화</button>
  </div>
</header>

<div class="project-bar">
  <div class="project-scroll" id="project-tabs"></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-btn-schedule" onclick="switchTab('schedule')">📅 일정</button>
  <button class="tab-btn" id="tab-btn-memo" onclick="switchTab('memo')">📝 메모</button>
</div>

<div class="tab-content active" id="tab-schedule">
  <div class="trip-meta">
    <div class="trip-meta-card">
      <div class="meta-field"><span class="meta-label">여행지</span><input type="text" id="meta-dest" placeholder="도쿄, 파리, 제주…" oninput="onChange()"/></div>
      <div class="meta-field"><span class="meta-label">여행 제목</span><input type="text" id="meta-title" placeholder="나의 특별한 여행" oninput="onChange()"/></div>
      <div class="meta-field" style="flex:0"><span class="meta-label">인원</span><input type="number" id="meta-people" placeholder="2" min="1" style="width:50px" oninput="onChange()"/></div>
    </div>
  </div>
  <div class="days-container" id="days-container"></div>
  <button class="btn btn-add-day" onclick="addDay()">＋ 날짜 추가</button>
</div>

<div class="tab-content" id="tab-memo">
  <div class="memo-outer">
    <div class="memo-wrap">
      <div class="memo-inner-tabs" id="memo-inner-tabs"></div>
      <div id="memo-notes-container"></div>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">저장됨 ✓</div>
<div class="toast" id="toast"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt=""/>
</div>

<div class="modal-overlay" id="export-modal" onclick="closeExportModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">📤 내보내기</div>
    <div class="modal-sub">현재 보고 있는 여행을 내보냅니다</div>
    <div class="modal-options">
      <div class="modal-option" onclick="doExportHTML();closeExportModal()">
        <div class="modal-option-icon">📱</div>
        <div><div class="modal-option-title">HTML 파일 (사진 포함)</div>
          <div class="modal-option-desc">어떤 기기에서도 브라우저로 열림</div></div>
      </div>
      <div class="modal-option" onclick="doExportTxt();closeExportModal()">
        <div class="modal-option-icon">📄</div>
        <div><div class="modal-option-title">텍스트 파일 (.txt)</div>
          <div class="modal-option-desc">사진 제외 · 가볍고 불러오기 가능</div></div>
      </div>
    </div>
    <button class="modal-cancel" onclick="closeExportModal()">취소</button>
  </div>
</div>

<script>
/* ════════════════════════════════
   CONFIG — 구글 시트 URL (고정)
════════════════════════════════ */
const GS_URL = "https://script.google.com/macros/s/AKfycby_ad_6PJx2neW8W6O1YJgOoiATZ8qngIguYCg7qFSCGsb2fNVpLpPxQZxLQNZw7pcA/exec";

/* ════════════════════════════════
   CONSTANTS
════════════════════════════════ */
const DIVIDER_COLORS=[{fg:'#5ba4cf'},{fg:'#4caf50'},{fg:'#9c27b0'},{fg:'#ff9800'},{fg:'#e91e63'},{fg:'#90a4ae'}];
const BD_COLORS=[{fg:'#90a4ae'},{fg:'#2196f3'},{fg:'#4caf50'},{fg:'#9c27b0'},{fg:'#ff9800'},{fg:'#e91e63'}];

// 유럽 여행 초기 데이터 (첫 로드 시 구글 시트에 없으면 사용)
const INIT_PLAN={"dest":"유럽","title":"2026 유럽","people":2,"days":[{"id":"day_1","title":"런던 도착","date":"2026-07-01","items":[{"id":"item_1","time":"14:00","name":"히드로 공항 도착","memo":"터미널 2","type":"move","photos":[]},{"id":"item_2","time":"16:00","name":"숙소 체크인","memo":"","type":"hotel","photos":[]},{"id":"item_3","time":"19:00","name":"코벤트 가든 저녁","memo":"","type":"food","photos":[]}],"photos":[],"collapsed":false},{"id":"day_2","title":"런던 관광","date":"2026-07-02","items":[{"id":"item_4","time":"09:00","name":"대영박물관","memo":"사전예약 필수","type":"tour","photos":[]},{"id":"item_5","time":"13:00","name":"점심 - 피쉬앤칩스","memo":"","type":"food","photos":[]},{"id":"item_6","time":"15:00","name":"버킹엄 궁전","memo":"","type":"tour","photos":[]},{"id":"item_7","time":"18:00","name":"타워브릿지","memo":"","type":"tour","photos":[]}],"photos":[],"collapsed":false},{"id":"day_3","title":"런던 → 파리","date":"2026-07-03","items":[{"id":"item_8","time":"08:00","name":"유로스타 탑승","memo":"세인트 판크라스역","type":"move","photos":[]},{"id":"item_9","time":"11:30","name":"파리 북역 도착","memo":"","type":"move","photos":[]},{"id":"item_10","time":"14:00","name":"에펠탑","memo":"엘리베이터 예약","type":"tour","photos":[]}],"photos":[],"collapsed":false}],"betweenDividers":{}};
const INIT_MEMO=[{"id":"note_1","title":"런던 여행 팁","content":"- 모든 박물관은 무료지만 사전 예약 필수!\n- 뮤지컬 당일표는 TodayTix 앱 10시 오픈\n- 7월 런던은 밤 9시까지 밝아요","checklist":[{"id":"chk_1","text":"여권 확인","checked":false},{"id":"chk_2","text":"유로 환전","checked":false},{"id":"chk_3","text":"유로스타 예약","checked":false}],"photos":[]}];

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let projects = [];
let activeProjectId = null;
let projectIdCounter = 0;
let plan = null;
let memoNotes = [];
let activeNoteId = null;
let dayIdCounter=0, itemIdCounter=0, noteIdCounter=0, checkIdCounter=0;
let dragSrcDay=null, dragSrcItem=null;
let saveTimer=null;
let isSaving=false;

/* ════════════════════════════════
   INIT — 항상 구글 시트 우선
════════════════════════════════ */
window.onload = async ()=>{
  setSyncState('loading','불러오는 중…');
  setLoadingStatus('구글 시트 연결 중...');

  try {
    // 구글 시트에서 데이터 로드
    const res = await fetch(GS_URL + '?action=getAll');
    const data = await res.json();

    if(data.ok && data.projects && data.projects.length > 0){
      // 구글 시트 데이터 사용
      setLoadingStatus('데이터 불러오기 성공!');
      loadProjects(data.projects, data.activeId);
    } else {
      // 구글 시트 비어있음 → 초기 데이터로 시작 후 저장
      setLoadingStatus('초기 데이터 설정 중...');
      initWithDefaultData();
      await saveToServer(); // 초기 데이터 서버에 저장
    }
  } catch(e) {
    // 네트워크 오류 → 초기 데이터로 시작
    setLoadingStatus('오프라인 모드 (네트워크 오류)');
    initWithDefaultData();
    setSyncState('error','오프라인');
    await new Promise(r=>setTimeout(r,1500));
  }

  hideLoading();
  renderAll();
  renderMemoTabs();
  renderProjectTabs();
  setSyncState('ok','동기화됨');
  document.addEventListener('paste', onGlobalPaste);
};

function setLoadingStatus(msg){
  document.getElementById('loading-status').textContent = msg;
}
function hideLoading(){
  const el = document.getElementById('loading-screen');
  el.classList.add('hidden');
  setTimeout(()=>el.style.display='none', 600);
}

function loadProjects(serverProjects, savedActiveId){
  projects = serverProjects.map(p=>({
    ...p,
    plan: sanitizePlan(p.plan || {}),
    memo: sanitizeMemo(p.memo || []),
    name: p.name || p.plan?.title || p.plan?.dest || '새 여행'
  }));
  projects.forEach(p=>{
    const n=parseInt((p.id||'').replace('proj_',''));
    if(n>projectIdCounter) projectIdCounter=n;
  });
  const target = projects.find(p=>p.id===savedActiveId) || projects[0];
  setActiveProject(target.id);
}

function initWithDefaultData(){
  projectIdCounter = 1;
  dayIdCounter = 3; itemIdCounter = 10; noteIdCounter = 1; checkIdCounter = 3;
  const initPlan = JSON.parse(JSON.stringify(INIT_PLAN));
  const initMemo = JSON.parse(JSON.stringify(INIT_MEMO));
  projects = [{id:'proj_1', name:'2026 유럽', plan:sanitizePlan(initPlan), memo:sanitizeMemo(initMemo)}];
  setActiveProject('proj_1');
}

function sanitizePlan(p){
  const out = Object.assign({dest:'',title:'',people:2,days:[],betweenDividers:{}}, p);
  out.betweenDividers = out.betweenDividers || {};
  out.days = (out.days||[]).map(d=>({
    ...d,
    photos: d.photos||[],
    items: (d.items||[]).map(it=>({...it, photos:it.photos||[]}))
  }));
  return out;
}
function sanitizeMemo(arr){
  return (arr||[]).map(n=>({...n, checklist:n.checklist||[], photos:n.photos||[]}));
}

function setActiveProject(pid){
  activeProjectId = pid;
  const proj = projects.find(p=>p.id===pid);
  if(!proj) return;
  plan = proj.plan;
  memoNotes = proj.memo;
  // 카운터 복원
  plan.days.forEach(d=>{
    const n=parseInt((d.id||'').replace('day_',''));if(n>dayIdCounter)dayIdCounter=n;
    (d.items||[]).forEach(it=>{const m=parseInt((it.id||'').replace('item_',''));if(m>itemIdCounter)itemIdCounter=m;});
  });
  memoNotes.forEach(n=>{
    const num=parseInt((n.id||'').replace('note_',''));if(num>noteIdCounter)noteIdCounter=num;
    (n.checklist||[]).forEach(it=>{const m=parseInt((it.id||'').replace('chk_',''));if(m>checkIdCounter)checkIdCounter=m;});
  });
  activeNoteId = memoNotes.length>0 ? memoNotes[0].id : null;
}

/* ════════════════════════════════
   SYNC — 구글 시트 저장
════════════════════════════════ */
function onChange(){
  syncMeta();
  scheduleAutoSave();
}

function syncMeta(){
  plan.dest = document.getElementById('meta-dest')?.value || plan.dest;
  plan.title = document.getElementById('meta-title')?.value || plan.title;
  plan.people = document.getElementById('meta-people')?.value || plan.people;
  const cur = projects.find(p=>p.id===activeProjectId);
  if(cur){ cur.plan=plan; cur.memo=memoNotes; cur.name=plan.title||plan.dest||cur.name; }
}

function scheduleAutoSave(){
  setSyncState('saving','저장 중…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    syncMeta();
    await saveToServer();
  }, 1500);
}

async function saveToServer(){
  if(isSaving) return;
  isSaving = true;
  try{
    const payload = {
      action:'saveAll',
      projects: projects.map(p=>({
        id:p.id, name:p.name,
        plan: p.id===activeProjectId ? plan : p.plan,
        memo: p.id===activeProjectId ? memoNotes : p.memo
      })),
      activeId: activeProjectId
    };
    const res = await fetch(GS_URL, {method:'POST', body:JSON.stringify(payload), headers:{'Content-Type':'application/json'}});
    const data = await res.json();
    if(data.ok){
      setSyncState('ok','동기화됨');
      showSaveToast();
    } else {
      setSyncState('error','저장 실패');
      showToast('⚠️ 저장 실패: '+data.error);
    }
  }catch(e){
    setSyncState('error','오프라인');
    showToast('⚠️ 네트워크 오류 — 나중에 다시 시도해주세요');
  } finally {
    isSaving = false;
  }
}

async function forcSync(){
  setSyncState('saving','동기화 중…');
  try{
    syncMeta();
    // 서버에 저장 먼저
    await saveToServer();
    // 서버에서 최신 로드
    const res = await fetch(GS_URL+'?action=getAll');
    const data = await res.json();
    if(data.ok && data.projects && data.projects.length>0){
      loadProjects(data.projects, data.activeId);
      renderAll(); renderMemoTabs(); renderProjectTabs();
      showToast('✅ 동기화 완료!');
    }
    setSyncState('ok','동기화됨');
  }catch(e){
    setSyncState('error','오프라인');
    showToast('⚠️ 동기화 실패');
  }
}

function setSyncState(state, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(!dot||!lbl) return;
  dot.className = 'sync-dot' + (state==='saving'?' saving':state==='error'?' error':'');
  lbl.textContent = label;
}

/* ════════════════════════════════
   PROJECT
════════════════════════════════ */
function createProject(name){
  const pid = 'proj_'+(++projectIdCounter);
  const np = sanitizePlan({dest:'',title:name||'새 여행',people:2,days:[],betweenDividers:{}});
  const nm = sanitizeMemo([]);
  projects.push({id:pid, name:name||'새 여행', plan:np, memo:nm});
  // 현재 project 저장
  const cur=projects.find(p=>p.id===activeProjectId);
  if(cur){cur.plan=plan;cur.memo=memoNotes;}
  setActiveProject(pid);
  addDay();
  memoNotes.push(blankNote());
  activeNoteId=memoNotes[0].id;
  renderAll(); renderMemoTabs(); renderProjectTabs();
  scheduleAutoSave();
}

function switchProject(pid){
  if(pid===activeProjectId) return;
  syncMeta();
  const cur=projects.find(p=>p.id===activeProjectId);
  if(cur){cur.plan=plan;cur.memo=memoNotes;}
  setActiveProject(pid);
  renderAll(); renderMemoTabs(); renderProjectTabs();
}

function deleteProject(pid){
  if(projects.length<=1){alert('최소 1개의 여행이 필요합니다.');return;}
  const proj=projects.find(p=>p.id===pid);
  if(!confirm(`"${proj?.name||'이 여행'}"을 삭제할까요?`))return;
  projects=projects.filter(p=>p.id!==pid);
  if(activeProjectId===pid){setActiveProject(projects[0].id);renderAll();renderMemoTabs();}
  renderProjectTabs();
  scheduleAutoSave();
}

function renameProject(pid){
  const proj=projects.find(p=>p.id===pid);if(!proj)return;
  const name=prompt('여행 이름:',proj.name);if(name===null)return;
  proj.name=name||proj.name;
  if(activeProjectId===pid){plan.title=proj.name;document.getElementById('meta-title').value=plan.title;}
  renderProjectTabs();scheduleAutoSave();
}

function blankNote(){return{id:'note_'+(++noteIdCounter),title:'',content:'',checklist:[],photos:[]};}

function renderProjectTabs(){
  document.getElementById('project-tabs').innerHTML=
    projects.map(p=>`
      <div class="project-tab ${p.id===activeProjectId?'active':''}" onclick="switchProject('${p.id}')" ondblclick="renameProject('${p.id}')">
        ✈️ ${escHtml(p.name||'새 여행')}
        <button class="project-tab-x" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</button>
      </div>`).join('')+
    `<button class="project-add" onclick="createProject()">＋</button>`;
}

/* ════════════════════════════════
   TABS
════════════════════════════════ */
function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('tab-btn-'+name).classList.add('active');
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function renderAll(){
  const dc=document.getElementById('days-container'); dc.innerHTML='';
  if(!plan){return;}
  document.getElementById('meta-dest').value=plan.dest||'';
  document.getElementById('meta-title').value=plan.title||'';
  document.getElementById('meta-people').value=plan.people||'';
  (plan.days||[]).forEach((day,idx)=>{
    if(idx>0){const key=`${plan.days[idx-1].id}__${day.id}`;renderBD(dc,key);}
    renderDayCard(day,idx,dc);
  });
  bindDayDrag();
}

function renderBD(container,key){
  plan.betweenDividers=plan.betweenDividers||{};
  const bd=plan.betweenDividers[key];
  const wrap=document.createElement('div'); wrap.className='between-divider';
  if(!bd){
    wrap.innerHTML=`<div class="between-divider-line"></div><button class="between-divider-add" onclick="addBD('${key}')">＋</button><div class="between-divider-line"></div>`;
  } else {
    const c=BD_COLORS[bd.colorIdx||0];
    wrap.innerHTML=`
      <div class="between-divider-line on" style="color:${c.fg}"></div>
      <input class="between-divider-label" type="text" value="${escHtml(bd.label||'')}" placeholder="라벨" style="color:${c.fg}" oninput="onBD('${key}',this.value)"/>
      <div class="between-divider-line on" style="color:${c.fg}"></div>
      <button class="between-divider-remove" onclick="removeBD('${key}')">✕</button>`;
  }
  container.appendChild(wrap);
}
function addBD(key){plan.betweenDividers[key]={label:'',colorIdx:0};onChange();renderAll();}
function removeBD(key){delete plan.betweenDividers[key];onChange();renderAll();}
function onBD(key,val){if(plan.betweenDividers?.[key])plan.betweenDividers[key].label=val;scheduleAutoSave();}

function renderDayCard(day,idx,container){
  const card=document.createElement('div'); card.className='day-card'; card.dataset.dayId=day.id;
  const cl=day.collapsed?'collapsed':''; const ci=day.collapsed?'▼':'▲';
  card.innerHTML=`
    <div class="day-header">
      <span class="day-drag-handle" id="dh-${day.id}">::</span>
      <span class="day-number">Day ${idx+1}</span>
      <input type="date" class="day-date-input" value="${day.date||''}" data-dayid="${day.id}" onchange="onDayDate(this)"/>
      <input type="text" class="day-title-input" value="${escHtml(day.title||'')}" placeholder="지역 / 테마" data-dayid="${day.id}" oninput="onDayTitle(this)"/>
      <div class="day-header-actions">
        <button class="btn-icon" onclick="toggleCollapse('${day.id}')">${ci}</button>
        <button class="btn-icon" onclick="deleteDay('${day.id}')">✕</button>
      </div>
    </div>
    <div class="schedule-list ${cl}" id="sl-${day.id}" data-dayid="${day.id}">
      ${(day.items||[]).length===0?'<div class="empty-schedule">일정을 추가해 보세요</div>':
        (day.items||[]).map(it=>it.isDivider?renderDivHTML(it,day.id):renderItemHTML(it,day.id)).join('')}
    </div>
    <div class="add-item-row">
      <button class="btn btn-ghost btn-sm" onclick="addItem('${day.id}')">＋ 일정</button>
      <button class="btn btn-ghost btn-sm" onclick="addDivider('${day.id}')">— 구분선</button>
      <label class="photo-upload-label">📷<input type="file" accept="image/*" multiple onchange="onDayPhoto(event,'${day.id}')"/></label>
      <button class="btn btn-ghost btn-sm" onclick="toggleDayPaste('${day.id}')">📋</button>
    </div>
    <div id="dpz-${day.id}" style="display:none;padding:0 11px 8px;">
      <div class="paste-zone" tabindex="0" onclick="this.focus()" onpaste="handlePaste(event,'day','${day.id}','')">📋 클릭 후 <span class="kbd">Ctrl+V</span></div>
    </div>
    <div class="photo-grid day-pg" id="day-photos-${day.id}"></div>`;
  container.appendChild(card);
  renderDayPhotos(day);
  bindItemDrag(day.id);
}

function renderDivHTML(item,dayId){
  const c=DIVIDER_COLORS[item.divColorIdx||0];
  return `<div class="schedule-divider" data-itemid="${item.id}" draggable="true" style="color:${c.fg}">
    <div class="divider-line"></div>
    <input class="divider-label-input" type="text" value="${escHtml(item.name||'')}" placeholder="라벨" style="color:${c.fg}" oninput="onItemField('${dayId}','${item.id}','name',this.value)"/>
    <div class="divider-line"></div>
    <button class="divider-del" onclick="deleteItem('${dayId}','${item.id}')">✕</button>
  </div>`;
}

function renderItemHTML(item,dayId){
  const ph=(item.photos||[]).map((src,i)=>
    `<div class="photo-thumb" onclick="openLightbox(event,'item','${dayId}','${item.id}',${i})">
      <img src="${src}"/><button class="photo-thumb-del" onclick="event.stopPropagation();deleteItemPhoto('${dayId}','${item.id}',${i})">✕</button>
    </div>`).join('');
  return `
    <div class="schedule-item" data-itemid="${item.id}" data-type="${item.type||'tour'}" draggable="true">
      <div class="item-row1">
        <span class="item-drag-handle">::</span>
        <div class="item-time"><input type="text" value="${escHtml(item.time||'')}" placeholder="10:00" oninput="onItemField('${dayId}','${item.id}','time',this.value)" maxlength="5"/></div>
        <div class="item-body">
          <div class="item-name"><input type="text" value="${escHtml(item.name||'')}" placeholder="장소 / 활동 이름" oninput="onItemField('${dayId}','${item.id}','name',this.value)"/></div>
          <div class="item-memo"><input type="text" value="${escHtml(item.memo||'')}" placeholder="메모" oninput="onItemField('${dayId}','${item.id}','memo',this.value)"/></div>
          <div class="item-type">
            <select onchange="onItemField('${dayId}','${item.id}','type',this.value)">
              <option value="tour"  ${item.type==='tour' ?'selected':''}>관광</option>
              <option value="food"  ${item.type==='food' ?'selected':''}>식사</option>
              <option value="move"  ${item.type==='move' ?'selected':''}>이동</option>
              <option value="hotel" ${item.type==='hotel'?'selected':''}>숙소</option>
              <option value="free"  ${item.type==='free' ?'selected':''}>자유</option>
            </select>
          </div>
        </div>
        <div class="item-actions">
          <label class="item-photo-btn">📷<input type="file" accept="image/*" multiple onchange="onItemPhoto(event,'${dayId}','${item.id}')"/></label>
          <button class="item-photo-btn" onclick="toggleItemPaste('${dayId}','${item.id}')">📋</button>
          <button class="item-del-btn" onclick="deleteItem('${dayId}','${item.id}')">✕</button>
        </div>
      </div>
      <div id="ipz-${item.id}" style="display:none;margin-top:5px;">
        <div class="paste-zone" tabindex="0" onclick="this.focus()" onpaste="handlePaste(event,'item','${dayId}','${item.id}')">📋 클릭 후 <span class="kbd">Ctrl+V</span></div>
      </div>
      ${ph?`<div class="photo-grid item-pg">${ph}</div>`:''}
    </div>`;
}

function renderDayPhotos(day){
  const g=document.getElementById('day-photos-'+day.id);if(!g)return;
  g.innerHTML=(day.photos||[]).map((src,i)=>
    `<div class="photo-thumb" onclick="openLightbox(event,'day','${day.id}','',${i})">
      <img src="${src}"/><button class="photo-thumb-del" onclick="event.stopPropagation();deleteDayPhoto('${day.id}',${i})">✕</button>
    </div>`).join('');
}

/* ════════════════════════════════
   MEMO
════════════════════════════════ */
function addNote(){const n=blankNote();memoNotes.push(n);activeNoteId=n.id;renderMemoTabs();scheduleAutoSave();}
function deleteNote(id){
  if(memoNotes.length<=1){alert('최소 1개 메모가 필요합니다.');return;}
  if(!confirm('삭제할까요?'))return;
  memoNotes=memoNotes.filter(n=>n.id!==id);
  if(activeNoteId===id)activeNoteId=memoNotes[0].id;
  renderMemoTabs();scheduleAutoSave();
}
function selectNote(id){activeNoteId=id;renderMemoTabs();}

function renderMemoTabs(){
  document.getElementById('memo-inner-tabs').innerHTML=
    memoNotes.map(n=>`
      <div class="memo-tab-pill ${n.id===activeNoteId?'active':''}" onclick="selectNote('${n.id}')">
        <span>${escHtml(n.title)||'새 메모'}</span>
        <button class="memo-tab-x" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
      </div>`).join('')+`<button class="memo-add-pill" onclick="addNote()">＋</button>`;
  document.getElementById('memo-notes-container').innerHTML=
    memoNotes.map(n=>`
      <div class="memo-note-body ${n.id===activeNoteId?'active':''}" id="nb-${n.id}">
        <input class="memo-note-title" type="text" value="${escHtml(n.title)}" placeholder="메모 제목" data-noteid="${n.id}" oninput="onNoteTitle(this)"/>
        <textarea class="memo-textarea" data-noteid="${n.id}" placeholder="내용을 자유롭게 적어보세요..." oninput="onNoteContent(this)">${escHtml(n.content)}</textarea>
        <div class="memo-section-label">✅ 체크리스트</div>
        <div class="memo-checklist" id="cl-${n.id}">
          ${n.checklist.map(it=>`
            <div class="memo-check-item">
              <input type="checkbox" ${it.checked?'checked':''} onchange="toggleCheck('${n.id}','${it.id}',this.checked)"/>
              <input type="text" value="${escHtml(it.text)}" placeholder="항목" oninput="onCheckText('${n.id}','${it.id}',this.value)"/>
              <button class="memo-check-del" onclick="delCheckItem('${n.id}','${it.id}')">✕</button>
            </div>`).join('')}
        </div>
        <div style="margin-bottom:14px;"><button class="btn btn-ghost btn-sm" onclick="addCheckItem('${n.id}')">＋ 항목</button></div>
        <div>
          <div class="memo-section-label">📷 사진</div>
          <div class="photo-grid" id="np-${n.id}" style="margin-bottom:8px;">
            ${(n.photos||[]).map((src,i)=>`
              <div class="photo-thumb" onclick="openLightbox(event,'note','${n.id}','',${i})">
                <img src="${src}"/><button class="photo-thumb-del" onclick="event.stopPropagation();deleteNotePhoto('${n.id}',${i})">✕</button>
              </div>`).join('')}
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
            <label class="photo-upload-label">📁<input type="file" accept="image/*" multiple onchange="onNotePhoto(event,'${n.id}')"/></label>
            <div class="paste-zone" tabindex="0" style="flex:1;min-width:150px;" onclick="this.focus()" onpaste="handlePaste(event,'note','','${n.id}')">📋 클릭 후 <span class="kbd">Ctrl+V</span></div>
          </div>
        </div>
      </div>`).join('');
}

function onNoteTitle(inp){const n=memoNotes.find(x=>x.id===inp.dataset.noteid);if(!n)return;n.title=inp.value;const p=document.querySelector('#memo-inner-tabs .memo-tab-pill.active span');if(p)p.textContent=n.title||'새 메모';scheduleAutoSave();}
function onNoteContent(ta){const n=memoNotes.find(x=>x.id===ta.dataset.noteid);if(n){n.content=ta.value;scheduleAutoSave();}}
function addCheckItem(nid){const n=memoNotes.find(x=>x.id===nid);if(!n)return;n.checklist.push({id:'chk_'+(++checkIdCounter),text:'',checked:false});renderMemoTabs();scheduleAutoSave();setTimeout(()=>{const cl=document.getElementById('cl-'+nid);if(cl){const ins=cl.querySelectorAll('input[type="text"]');if(ins.length)ins[ins.length-1].focus();}},40);}
function delCheckItem(nid,cid){const n=memoNotes.find(x=>x.id===nid);if(!n)return;n.checklist=n.checklist.filter(it=>it.id!==cid);renderMemoTabs();scheduleAutoSave();}
function toggleCheck(nid,cid,checked){const n=memoNotes.find(x=>x.id===nid);if(!n)return;const it=n.checklist.find(i=>i.id===cid);if(it){it.checked=checked;scheduleAutoSave();}}
function onCheckText(nid,cid,val){const n=memoNotes.find(x=>x.id===nid);if(!n)return;const it=n.checklist.find(i=>i.id===cid);if(it){it.text=val;scheduleAutoSave();}}

/* ════════════════════════════════
   SCHEDULE CHANGES
════════════════════════════════ */
function onDayDate(inp){
  const dayId=inp.dataset.dayid, idx=plan.days.findIndex(d=>d.id===dayId);
  plan.days[idx].date=inp.value;
  if(idx===0&&inp.value){
    const p=inp.value.split('-'),b=new Date(+p[0],+p[1]-1,+p[2]);
    for(let i=1;i<plan.days.length;i++){
      const nd=new Date(+p[0],+p[1]-1,+p[2]);nd.setDate(b.getDate()+i);
      plan.days[i].date=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`;
    }
  }
  onChange();renderAll();
}
function onDayTitle(inp){const d=plan.days.find(x=>x.id===inp.dataset.dayid);if(d){d.title=inp.value;scheduleAutoSave();}}
function onItemField(dayId,itemId,field,value){
  const d=plan.days.find(x=>x.id===dayId);if(!d)return;
  const it=d.items.find(x=>x.id===itemId);if(!it)return;
  it[field]=value;
  if(field==='type'){const el=document.querySelector(`[data-itemid="${itemId}"]`);if(el)el.dataset.type=value;}
  scheduleAutoSave();
}

/* ════════════════════════════════
   ADD / DELETE
════════════════════════════════ */
function addDay(){
  const idx=plan.days.length; let date='';
  if(idx>0&&plan.days[0].date){
    const p=plan.days[0].date.split('-'),b=new Date(+p[0],+p[1]-1,+p[2]);
    b.setDate(b.getDate()+idx);
    date=`${b.getFullYear()}-${String(b.getMonth()+1).padStart(2,'0')}-${String(b.getDate()).padStart(2,'0')}`;
  }
  plan.days.push({id:'day_'+(++dayIdCounter),title:'',date,items:[],photos:[],collapsed:false});
  onChange();renderAll();
}
function deleteDay(dayId){
  if(plan.days.length<=1){alert('최소 1개의 날짜가 필요합니다.');return;}
  if(!confirm('이 날짜를 삭제할까요?'))return;
  if(plan.betweenDividers)Object.keys(plan.betweenDividers).forEach(k=>{if(k.includes(dayId))delete plan.betweenDividers[k];});
  plan.days=plan.days.filter(d=>d.id!==dayId);onChange();renderAll();
}
function addItem(dayId){
  const d=plan.days.find(x=>x.id===dayId);if(!d)return;
  d.items.push({id:'item_'+(++itemIdCounter),time:'',name:'',memo:'',type:'tour',photos:[]});
  onChange();renderAll();
  setTimeout(()=>{const sl=document.getElementById('sl-'+dayId);if(sl){const ins=sl.querySelectorAll('.item-name input');if(ins.length)ins[ins.length-1].focus();}},50);
}
function addDivider(dayId){const d=plan.days.find(x=>x.id===dayId);if(!d)return;d.items.push({id:'item_'+(++itemIdCounter),isDivider:true,name:'',divColorIdx:0});onChange();renderAll();}
function deleteItem(dayId,itemId){const d=plan.days.find(x=>x.id===dayId);if(!d)return;d.items=d.items.filter(it=>it.id!==itemId);onChange();renderAll();}
function toggleCollapse(dayId){const d=plan.days.find(x=>x.id===dayId);if(d){d.collapsed=!d.collapsed;onChange();renderAll();}}

/* ════════════════════════════════
   DRAG & DROP
════════════════════════════════ */
function bindDayDrag(){
  document.querySelectorAll('.day-card').forEach(card=>{
    const h=card.querySelector('.day-drag-handle');
    if(h){
      h.setAttribute('draggable','true');
      h.addEventListener('dragstart',e=>{e.stopPropagation();dragSrcDay=card.dataset.dayId;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','day:'+dragSrcDay);});
      h.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('drag-over'));});
    }
    card.addEventListener('dragover',e=>{e.preventDefault();if(card.dataset.dayId!==dragSrcDay)card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();const t=card.dataset.dayId;
      if(dragSrcDay&&t&&dragSrcDay!==t){
        const si=plan.days.findIndex(d=>d.id===dragSrcDay),ti=plan.days.findIndex(d=>d.id===t);
        const[m]=plan.days.splice(si,1);plan.days.splice(ti,0,m);onChange();renderAll();
      }
    });
  });
}
function bindItemDrag(dayId){
  const sl=document.getElementById('sl-'+dayId);if(!sl)return;
  sl.querySelectorAll('.schedule-item,.schedule-divider').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrcItem={itemId:el.dataset.itemid,fromDayId:dayId};el.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','item:'+el.dataset.itemid);e.stopPropagation();});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.schedule-item,.schedule-divider').forEach(i=>i.classList.remove('drag-over-item'));});
    el.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();el.classList.add('drag-over-item');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over-item'));
    el.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();if(!dragSrcItem)return;if(dragSrcItem.itemId!==el.dataset.itemid)moveItem(dragSrcItem.fromDayId,dragSrcItem.itemId,dayId,el.dataset.itemid);});
  });
  sl.addEventListener('dragover',e=>e.preventDefault());
  sl.addEventListener('drop',e=>{e.preventDefault();if(!dragSrcItem||e.target===sl)moveItemEnd(dragSrcItem.fromDayId,dragSrcItem.itemId,dayId);});
}
function moveItem(fd,iid,td,bid){
  const f=plan.days.find(d=>d.id===fd),t=plan.days.find(d=>d.id===td);if(!f||!t)return;
  const si=f.items.findIndex(it=>it.id===iid);if(si===-1)return;
  const[item]=f.items.splice(si,1);const ti=t.items.findIndex(it=>it.id===bid);
  t.items.splice(ti===-1?t.items.length:ti,0,item);onChange();renderAll();
}
function moveItemEnd(fd,iid,td){
  if(fd===td)return;
  const f=plan.days.find(d=>d.id===fd),t=plan.days.find(d=>d.id===td);if(!f||!t)return;
  const si=f.items.findIndex(it=>it.id===iid);if(si===-1)return;
  const[item]=f.items.splice(si,1);t.items.push(item);onChange();renderAll();
}

/* ════════════════════════════════
   PHOTO & PASTE
════════════════════════════════ */
function toggleDayPaste(id){const el=document.getElementById('dpz-'+id);const o=el.style.display!=='none';document.querySelectorAll('[id^="dpz-"]').forEach(e=>e.style.display='none');if(!o){el.style.display='';el.querySelector('.paste-zone').focus();}}
function toggleItemPaste(did,iid){const el=document.getElementById('ipz-'+iid);const o=el.style.display!=='none';document.querySelectorAll('[id^="ipz-"]').forEach(e=>e.style.display='none');if(!o){el.style.display='';el.querySelector('.paste-zone').focus();}}
function handlePaste(e,type,dayId,itemId){
  e.preventDefault();e.stopPropagation();
  const items=[...(e.clipboardData?.items||[])];let found=false;
  for(const it of items){if(it.type.startsWith('image/')){found=true;const f=it.getAsFile();if(!f)continue;const r=new FileReader();r.onload=ev=>addPhotoSrc(ev.target.result,type,dayId,itemId);r.readAsDataURL(f);}}
  if(!found)showToast('클립보드에 이미지가 없습니다');
}
function onGlobalPaste(e){if(!document.activeElement?.classList.contains('paste-zone'))return;}
function addPhotoSrc(src,type,dayId,itemId){
  if(type==='day'){const d=plan.days.find(x=>x.id===dayId);if(!d)return;(d.photos=d.photos||[]).push(src);renderDayPhotos(d);scheduleAutoSave();showToast('📷 완료');document.querySelectorAll('[id^="dpz-"]').forEach(e=>e.style.display='none');}
  else if(type==='item'){const d=plan.days.find(x=>x.id===dayId);if(!d)return;const it=d.items.find(x=>x.id===itemId);if(!it)return;(it.photos=it.photos||[]).push(src);renderAll();scheduleAutoSave();showToast('📷 완료');}
  else if(type==='note'){const n=memoNotes.find(x=>x.id===itemId);if(!n)return;(n.photos=n.photos||[]).push(src);renderMemoTabs();scheduleAutoSave();showToast('📷 완료');}
}
function readFiles(files,cb){const res=[],total=files.length;let done=0;if(!total){cb([]);return;}Array.from(files).forEach((f,i)=>{const r=new FileReader();r.onload=e=>{res[i]=e.target.result;if(++done===total)cb(res);};r.readAsDataURL(f);});}
function onDayPhoto(e,dayId){const d=plan.days.find(x=>x.id===dayId);if(!d)return;readFiles(e.target.files,srcs=>{(d.photos=d.photos||[]).push(...srcs);renderDayPhotos(d);scheduleAutoSave();});}
function deleteDayPhoto(dayId,idx){const d=plan.days.find(x=>x.id===dayId);if(!d)return;d.photos.splice(idx,1);renderDayPhotos(d);scheduleAutoSave();}
function onItemPhoto(e,dayId,itemId){const d=plan.days.find(x=>x.id===dayId);if(!d)return;const it=d.items.find(x=>x.id===itemId);if(!it)return;readFiles(e.target.files,srcs=>{(it.photos=it.photos||[]).push(...srcs);renderAll();scheduleAutoSave();});}
function deleteItemPhoto(dayId,itemId,idx){const d=plan.days.find(x=>x.id===dayId);if(!d)return;const it=d.items.find(x=>x.id===itemId);if(!it||!it.photos)return;it.photos.splice(idx,1);renderAll();scheduleAutoSave();}
function onNotePhoto(e,noteId){const n=memoNotes.find(x=>x.id===noteId);if(!n)return;readFiles(e.target.files,srcs=>{(n.photos=n.photos||[]).push(...srcs);renderMemoTabs();scheduleAutoSave();});}
function deleteNotePhoto(noteId,idx){const n=memoNotes.find(x=>x.id===noteId);if(!n)return;n.photos.splice(idx,1);renderMemoTabs();scheduleAutoSave();}

/* ════════════════════════════════
   LIGHTBOX
════════════════════════════════ */
function openLightbox(e,type,id1,id2,idx){
  e.stopPropagation();let src='';
  if(type==='day'){const d=plan.days.find(x=>x.id===id1);if(d)src=(d.photos||[])[idx]||'';}
  else if(type==='item'){const d=plan.days.find(x=>x.id===id1);if(d){const it=d.items.find(x=>x.id===id2);if(it)src=(it.photos||[])[idx]||'';}}
  else if(type==='note'){const n=memoNotes.find(x=>x.id===id1);if(n)src=(n.photos||[])[idx]||'';}
  if(!src)return;
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

/* ════════════════════════════════
   RESET
════════════════════════════════ */
function resetCurrent(){
  if(!confirm('현재 여행의 모든 데이터를 초기화할까요?\n구글 시트에서도 삭제됩니다.'))return;
  const cur=projects.find(p=>p.id===activeProjectId);
  const name=cur?.name||'새 여행';
  plan=sanitizePlan({dest:'',title:name,people:2,days:[],betweenDividers:{}});
  memoNotes=[];dayIdCounter=0;itemIdCounter=0;noteIdCounter=0;checkIdCounter=0;
  if(cur){cur.plan=plan;cur.memo=memoNotes;}
  addDay();memoNotes.push(blankNote());activeNoteId=memoNotes[0].id;
  renderAll();renderMemoTabs();scheduleAutoSave();showToast('🗑 초기화됨');
}

/* ════════════════════════════════
   EXPORT
════════════════════════════════ */
function openExportModal(){document.getElementById('export-modal').classList.add('open');}
function closeExportModal(){document.getElementById('export-modal').classList.remove('open');}
function doExportHTML(){
  syncMeta();
  const injected=document.documentElement.outerHTML.replace('</head>',`<script>var EXPORTED_PLAN=${JSON.stringify(plan)};var EXPORTED_MEMO=${JSON.stringify(memoNotes)};<\/script>\n</head>`);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([injected],{type:'text/html;charset=utf-8'}));
  a.download=`travel_${(plan.title||plan.dest||'trip').replace(/[\\/:*?"<>|]/g,'_')}.html`;a.click();
  showToast('📱 HTML 내보내기 완료!');
}
function doExportTxt(){
  syncMeta();
  let t=`[Travel Planner V3.0]\n여행지:${plan.dest||'-'}\n제목:${plan.title||'-'}\n인원:${plan.people||'-'}명\n\n`;
  (plan.days||[]).forEach((day,i)=>{t+=`--- Day ${i+1} ${day.date||''} ${day.title||''} ---\n`;(day.items||[]).forEach(it=>{if(it.isDivider){t+=`  ---- ${it.name||''} ----\n`;return;}t+=`  [${it.time||'--:--'}] ${it.name||'(미입력)'}`;if(it.memo)t+=` | ${it.memo}`;t+=` (${it.type})\n`;});t+='\n';});
  if(memoNotes.length){t+=`\n==== 메모 ====\n`;memoNotes.forEach(n=>{t+=`\n[${n.title||'새 메모'}]\n${n.content||''}\n`;(n.checklist||[]).forEach(it=>t+=`  [${it.checked?'✓':' '}] ${it.text}\n`);});}
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain;charset=utf-8'}));
  a.download=`travel_${(plan.title||plan.dest||'trip').replace(/[\\/:*?"<>|]/g,'_')}.txt`;a.click();
  showToast('📄 TXT 내보내기 완료!');
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
function showSaveToast(){const el=document.getElementById('save-toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
function showToast(msg,dur=3000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}

/* ════════════════════════════════
   UTIL
════════════════════════════════ */
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
